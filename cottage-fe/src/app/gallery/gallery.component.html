<section class="gallery-page">
  <section class="gallery-hero">
    <div class="gallery-hero__content">
      <span class="gallery-hero__label">{{ 'gallery.label' | translate }}</span>
      <h1>{{ 'gallery.title' | translate }}</h1>
      <p>{{ 'gallery.subtitle' | translate }}</p>
    </div>
  </section>

  <section class="gallery-photos">
    <div class="section-header">
      <span class="section-label">{{ 'gallery.photos.label' | translate }}</span>
      <h2>{{ 'gallery.photos.title' | translate }}</h2>
      <p>{{ 'gallery.photos.description' | translate }}</p>
    </div>

    <div class="gallery-grid">
      <figure class="gallery-card gallery-card--large">
        <img src="assets/images/gallery/gallery_1.jpg" alt="Cottage exterior" />
      </figure>

      <figure class="gallery-card">
        <img src="assets/images/gallery/gallery_2.jpg" alt="Living room" />
      </figure>

      <figure class="gallery-card">
        <img src="assets/images/gallery/gallery_3.jpg" alt="Bedroom" />
      </figure>

      <figure class="gallery-card">
        <img src="assets/images/gallery/gallery_4.jpg" alt="Kitchen" />
      </figure>

      <figure class="gallery-card">
        <img src="assets/images/gallery/gallery_5.jpg" alt="Terrace" />
      </figure>

      <figure class="gallery-card gallery-card--wide">
        <img src="assets/images/gallery/gallery_6.jpg" alt="Surroundings" />
      </figure>

      <figure class="gallery-card">
        <img src="assets/images/gallery/gallery_7.jpg" alt="Interior detail" />
      </figure>

      <figure class="gallery-card">
        <img src="assets/images/gallery/gallery_8.jpg" alt="Dining area" />
      </figure>

      <figure class="gallery-card">
        <img src="assets/images/gallery/gallery_9.jpg" alt="Bathroom" />
      </figure>

      <figure class="gallery-card">
        <img src="assets/images/gallery/gallery_10.jpg" alt="Garden view" />
      </figure>

      <figure class="gallery-card">
        <img src="assets/images/gallery/gallery_11.jpg" alt="Evening exterior" />
      </figure>

      <figure class="gallery-card">
        <img src="assets/images/gallery/gallery_13.jpg" alt="Relax zone" />
      </figure>

      
      <figure class="gallery-card">
        <img src="assets/images/gallery/gallery_12.jpg" alt="Relax zone" />
      </figure>
    </div>
  </section>
</section>
